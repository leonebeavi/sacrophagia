# Release automatizada: ao enviar uma tag (ex.: 0.1.0), monta o zip instalável
# e anexa sacrophagia.zip + system.json à release do GitHub. É esse par de
# assets que faz o manifest/download do system.json resolverem no Foundry.
name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Recompila o CSS a partir das fontes SCSS (garante zip atualizado)
      - name: Compilar o CSS
        run: |
          npm ci
          npm run css:build

      # Lista de inclusão explícita: só o que a instalação precisa
      # (styles entra só com o css compilado, sem as fontes SCSS)
      - name: Montar o zip do sistema
        run: |
          zip -r sacrophagia.zip \
            system.json \
            sacrophagia.mjs \
            module \
            styles/sacrophagia.css \
            templates \
            lang \
            LICENSE \
            README.md

      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sacrophagia.zip
            system.json
